           }
           .Main{
            background-color: rgb(255, 255, 255);

            justify-content: space-evenly;

           .Main:hover .Sub{
            transform: scale(0.8); 
           }
           .Main .Sub:hover{
            transform: scale(1);
            background-color: rgb(255, 15, 15);
            box-shadow: 10px 10px 10px rgb(0, 0, 0);
           }
